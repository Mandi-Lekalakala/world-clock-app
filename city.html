<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Clock - City</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="app-container">
      <!-- ==HEADER== -->

      <header class="header">
        <div class="app-logo">
          <h1>World Clock</h1>
        </div>
        <button class="theme-toggle">Light Mode</button>
      </header>

      <!-- ==CITY HERO== -->

      <section class="city-hero-section">
        <div class="city-hero-header">
          <h2 class="city-name">Paris · CET</h2>
        </div>
        <div class="city-hero-time">
          <span id="city-time">15:35:21</span>
        </div>
        <div class="city-hero-date">
          <span id="city-date">Monday, 1 June 2026</span>
        </div>
        <div class="city-hero-offset">
          <span id="city-offset">UTC +1</span>
        </div>
      </section>

      <!-- ==BACK BUTTON== -->

      <a href="index.html" class="back-btn">← Back to Home</a>
    </div>

    <!-- ==FOOTER== -->

    <footer class="footer">
      <p>&copy; 2026 World Clock App. All rights reserved.</p>
      <div class="footer-links">
        <a
          href="https://github.com/Mandi-Lekalakala"
          target="_blank"
          aria-label="GitHub"
        >
          <i class="fa-brands fa-github"></i>
        </a>
        <a
          href="https://www.linkedin.com/in/mandilekalakala"
          target="_blank"
          aria-label="LinkedIn"
        >
          <i class="fa-brands fa-linkedin"></i>
        </a>
      </div>
    </footer>

    <script src="javascript/city.js"></script>
  </body>
</html>
