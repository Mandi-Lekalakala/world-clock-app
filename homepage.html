<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Clock App</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- ==HEADER== -->

      <header class="header">
        <div class="app-logo">
          <h1>World Clock</h1>
        </div>
        <button class="theme-toggle">Light Mode</button>
      </header>

      <!-- ==HERO== -->

      <section class="hero-section">
        <div class="local-hero-header">
          <h2 class="local-city-name">Pretoria · SAST</h2>
        </div>
        <div class="local-hero-time">
          <span>12:45:30</span>
        </div>
        <div class="local-hero-date">
          <span>Monday, 1 June 2026</span>
        </div>
        <div class="local-hero-badge">
          <span>Your Local Time</span>
        </div>
      </section>

      <!-- FEATURED CITIES -->

      <section class="city-clock-grid">
        <!-- Clock Card 1 -->

        <article class="city-clock-card" data-zone="Europe/London">
          <h3>London · BST</h3>
          <div class="city-card-time">13:41</div>
          <p>GMT +1</p>
        </article>

        <!-- Clock Card 2 -->

        <article class="city-clock-card" data-zone="America/New_York">
          <h3>New York · EST</h3>
          <div class="city-card-time">08:41</div>
          <p>GMT -4</p>
        </article>

        <!-- Clock Card 3 -->

        <article class="city-clock-card" data-zone="Australia/Sydney">
          <h3>Sydney · AEST</h3>
          <div class="city-card-time">23:41</div>
          <p>GMT +10</p>
        </article>

        <!-- Clock Card 4 -->

        <article class="city-clock-card" data-zone="America/Mexico_City">
          <h3>Mexico City · CST</h3>
          <div class="city-card-time">12:29</div>
          <p>GMT -6</p>
        </article>
      </section>

      <!-- TIMEZONE SELECTOR -->

      <section class="timezone">
        <select id="timezone-dropdown">
          <option value="">Add a city or timezone...</option>
          <option value="Europe/Paris">Paris</option>
          <option value="Europe/Berlin">Berlin</option>
          <option value="America/Toronto">Toronto</option>
          <option value="Asia/Singapore">Singapore</option>
          <option value="Africa/Accra">Accra</option>
        </select>
      </section>
    </div>

    <footer>
      <p>&copy; 2026 World Clock App. All rights reserved.</p>
    </footer>

    <script src="javascript/home.js"></script>
  </body>
</html>
