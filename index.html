<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Clock App</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>
  </head>
  <body>
    <div class="app-container">
      <!-- ==HEADER== -->

      <header class="header">
        <div class="app-logo">
          <h1><i class="fa-solid fa-moon logo-icon"></i>World Clock</h1>
        </div>
        <button class="theme-toggle">Dark Mode</button>
      </header>

      <!-- ==HERO== -->

      <section class="hero-section">
        <div class="local-city-name">
          <h2 id="user-city"></h2>
        </div>
        <div class="local-hero-time">
          <span id="user-time"></span>
        </div>
        <div class="local-hero-date">
          <span id="user-date"></span>
        </div>
        <div class="local-hero-badge">
          <span>Your Local Time</span>
        </div>
      </section>

      <!-- FEATURED CITIES -->

      <section class="city-clock-grid">
        <!-- Clock Card 1 -->

        <article class="city-clock-card" data-zone="Europe/London">
          <h3 id="city-card-name"></h3>
          <div class="city-card-time" id="city-card-time"></div>
          <p id="city-gmt"></p>
        </article>

        <!-- Clock Card 2 -->

        <article class="city-clock-card" data-zone="America/New_York">
          <h3 id="city-card-name"></h3>
          <div class="city-card-time" id="city-card-time"></div>
          <p id="city-gmt"></p>
        </article>

        <!-- Clock Card 3 -->

        <article class="city-clock-card" data-zone="Australia/Sydney">
          <h3 id="city-card-name"></h3>
          <div class="city-card-time" id="city-card-time"></div>
          <p id="city-gmt"></p>
        </article>

        <!-- Clock Card 4 -->

        <article class="city-clock-card" data-zone="Africa/Johannesburg">
          <h3 id="city-card-name"></h3>
          <div class="city-card-time" id="city-card-time"></div>
          <p id="city-gmt"></p>
        </article>
      </section>

      <!-- TIMEZONE SELECTOR -->

      <section class="timezone">
        <select id="timezone-dropdown">
          <option value="">+ Add a city or timezone...</option>
          <option value="Europe/Paris">Paris</option>
          <option value="Europe/Berlin">Berlin</option>
          <option value="America/Toronto">Toronto</option>
          <option value="Asia/Singapore">Singapore</option>
          <option value="Africa/Accra">Accra</option>
        </select>
      </section>
    </div>

    <!-- ==FOOTER== -->

    <footer class="footer">
      <p>&copy; 2026 World Clock App. All rights reserved.</p>
      <div class="footer-links">
        <a
          href="https://github.com/Mandi-Lekalakala"
          target="_blank"
          aria-label="GitHub"
        >
          <i class="fa-brands fa-github"></i>
        </a>
        <a
          href="https://www.linkedin.com/in/mandilekalakala"
          target="_blank"
          aria-label="LinkedIn"
        >
          <i class="fa-brands fa-linkedin"></i>
        </a>
      </div>
    </footer>

    <script src="javascript/home.js"></script>
  </body>
</html>
